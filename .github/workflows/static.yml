# Workflow deploy nội dung tĩnh lên GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # Thay đổi thành tên branch mặc định của bạn (ví dụ: master hoặc main)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.' # Thư mục chứa file privacy_policy.html của bạn
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
